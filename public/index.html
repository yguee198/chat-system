<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatApp - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-bg {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    }
    .glass-card {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(99, 102, 241, 0.2);
    }
    .input-field {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(99, 102, 241, 0.3);
      transition: all 0.3s ease;
    }
    .input-field:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
    }
    .fade-in {
      animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8 fade-in">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-500/20 mb-4">
        <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white">ChatApp</h1>
      <p class="text-slate-400 mt-2">Connect with friends instantly</p>
    </div>

    <!-- Login Form -->
    <div class="glass-card rounded-2xl p-8 fade-in" id="loginForm">
      <h2 class="text-2xl font-semibold text-white mb-6">Welcome back</h2>

      <form id="login" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Email</label>
          <input type="email" name="email" required
            class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-slate-500 outline-none"
            placeholder="you@example.com">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
          <input type="password" name="password" required
            class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-slate-500 outline-none"
            placeholder="••••••••">
        </div>

        <button type="submit" class="btn-primary w-full py-3 rounded-lg text-white font-semibold">
          Sign In
        </button>
      </form>

      <p class="text-center text-slate-400 mt-6">
        Don't have an account?
        <button id="showRegister" class="text-indigo-400 hover:text-indigo-300 font-medium ml-1">
          Sign up
        </button>
      </p>
    </div>

    <!-- Register Form -->
    <div class="glass-card rounded-2xl p-8 fade-in hidden" id="registerForm">
      <h2 class="text-2xl font-semibold text-white mb-6">Create account</h2>

      <form id="register" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
          <input type="text" name="username" required minlength="3"
            class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-slate-500 outline-none"
            placeholder="johndoe">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Email</label>
          <input type="email" name="email" required
            class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-slate-500 outline-none"
            placeholder="you@example.com">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
          <input type="password" name="password" required minlength="6"
            class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-slate-500 outline-none"
            placeholder="••••••••">
        </div>

        <button type="submit" class="btn-primary w-full py-3 rounded-lg text-white font-semibold">
          Create Account
        </button>
      </form>

      <p class="text-center text-slate-400 mt-6">
        Already have an account?
        <button id="showLogin" class="text-indigo-400 hover:text-indigo-300 font-medium ml-1">
          Sign in
        </button>
      </p>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300">
      <span id="toastMessage"></span>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const showRegister = document.getElementById('showRegister');
    const showLogin = document.getElementById('showLogin');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');

    showRegister.addEventListener('click', () => {
      loginForm.classList.add('hidden');
      registerForm.classList.remove('hidden');
    });

    showLogin.addEventListener('click', () => {
      registerForm.classList.add('hidden');
      loginForm.classList.remove('hidden');
    });

    function showToast(message, type = 'error') {
      toast.className = `fixed bottom-4 right-4 ${type === 'error' ? 'bg-red-500' : 'bg-green-500'} text-white px-6 py-3 rounded-lg shadow-lg transform transition-all duration-300`;
      toastMessage.textContent = message;
      toast.classList.remove('translate-y-20', 'opacity-0');
      setTimeout(() => {
        toast.classList.add('translate-y-20', 'opacity-0');
      }, 3000);
    }

    // Login
    document.getElementById('login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = {
        email: formData.get('email'),
        password: formData.get('password')
      };

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok) {
          localStorage.setItem('token', result.token);
          localStorage.setItem('user', JSON.stringify(result.user));
          window.location.href = '/chat';
        } else {
          showToast(result.message);
        }
      } catch (error) {
        showToast('Connection error');
      }
    });

    // Register
    document.getElementById('register').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = {
        username: formData.get('username'),
        email: formData.get('email'),
        password: formData.get('password')
      };

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok) {
          localStorage.setItem('token', result.token);
          localStorage.setItem('user', JSON.stringify(result.user));
          window.location.href = '/chat';
        } else {
          showToast(result.message);
        }
      } catch (error) {
        showToast('Connection error');
      }
    });

    // Check if already logged in
    const token = localStorage.getItem('token');
    if (token) {
      window.location.href = '/chat';
    }
  </script>
</body>
</html>
