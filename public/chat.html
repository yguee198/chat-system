<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatApp - Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .online-dot {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .message-enter {
      animation: messageIn 0.3s ease-out;
    }
    @keyframes messageIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .scrollbar-thin::-webkit-scrollbar {
      width: 6px;
    }
    .scrollbar-thin::-webkit-scrollbar-track {
      background: #1e293b;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 3px;
    }
  </style>
</head>
<body class="bg-slate-900 h-screen overflow-hidden">
  <div class="flex h-full">
    <!-- Sidebar -->
    <div class="w-80 bg-slate-800 border-r border-slate-700 flex flex-col">
      <!-- Header -->
      <div class="p-4 border-b border-slate-700">
        <div class="flex items-center justify-between">
          <h1 class="text-xl font-bold text-white flex items-center gap-2">
            <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
            </svg>
            ChatApp
          </h1>
          <button id="logout" class="text-slate-400 hover:text-white transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
          </button>
        </div>
      </div>

      <!-- User Info -->
      <div class="p-4 border-b border-slate-700">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-indigo-500 flex items-center justify-center text-white font-semibold" id="userInitial">
            U
          </div>
          <div>
            <p class="text-white font-medium" id="currentUsername">User</p>
            <p class="text-xs text-emerald-400 flex items-center gap-1">
              <span class="w-2 h-2 rounded-full bg-emerald-400 online-dot"></span>
              Online
            </p>
          </div>
        </div>
      </div>

      <!-- Users List -->
      <div class="flex-1 overflow-y-auto scrollbar-thin">
        <div class="p-3">
          <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 px-2">Contacts</p>
          <div id="usersList" class="space-y-1">
            <!-- Users will be loaded here -->
          </div>
        </div>
      </div>
    </div>

    <!-- Main Chat Area -->
    <div class="flex-1 flex flex-col">
      <!-- Chat Header -->
      <div class="h-16 bg-slate-800 border-b border-slate-700 flex items-center px-6">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center text-white font-semibold" id="chatUserInitial">
            ?
          </div>
          <div>
            <p class="text-white font-medium" id="chatUsername">Select a user</p>
            <p class="text-xs text-slate-400" id="chatStatus">Choose someone to chat with</p>
          </div>
        </div>
      </div>

      <!-- Messages Area -->
      <div id="messagesArea" class="flex-1 overflow-y-auto p-6 space-y-4 scrollbar-thin bg-slate-900">
        <div class="h-full flex items-center justify-center">
          <div class="text-center">
            <svg class="w-16 h-16 text-slate-600 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
            </svg>
            <p class="text-slate-500">Select a conversation to start messaging</p>
          </div>
        </div>
      </div>

      <!-- Message Input -->
      <div class="p-4 bg-slate-800 border-t border-slate-700">
        <form id="messageForm" class="flex gap-3">
          <input type="text" id="messageInput" placeholder="Type a message..." disabled
            class="flex-1 bg-slate-700 text-white px-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed placeholder-slate-400">
          <button type="submit" id="sendBtn" disabled
            class="bg-indigo-500 hover:bg-indigo-600 disabled:bg-slate-600 disabled:cursor-not-allowed text-white px-6 py-3 rounded-xl font-medium transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
            </svg>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const socket = io();
    let currentUser = null;
    let selectedUserId = null;
    let onlineUsers = new Set();

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      const userStr = localStorage.getItem('user');

      if (!token || !userStr) {
        window.location.href = '/';
        return;
      }

      currentUser = JSON.parse(userStr);
      document.getElementById('currentUsername').textContent = currentUser.username;
      document.getElementById('userInitial').textContent = currentUser.username.charAt(0).toUpperCase();

      // Join socket
      socket.emit('user:join', token);

      // Load users
      loadUsers();
    });

    // Socket events
    socket.on('users:online', (users) => {
      onlineUsers = new Set(users);
      updateUserStatus();
    });

    socket.on('user:online', (userId) => {
      onlineUsers.add(userId);
      updateUserStatus();
    });

    socket.on('user:offline', (userId) => {
      onlineUsers.delete(userId);
      updateUserStatus();
    });

    socket.on('message:receive', (message) => {
      if (message.sender._id === selectedUserId) {
        appendMessage(message, 'received');
        scrollToBottom();
      }
    });

    socket.on('message:sent', (message) => {
      appendMessage(message, 'sent');
      scrollToBottom();
    });

    socket.on('message:history', (messages) => {
      const messagesArea = document.getElementById('messagesArea');
      messagesArea.innerHTML = '';

      messages.forEach(msg => {
        const isSent = msg.sender._id === currentUser._id;
        appendMessage(msg, isSent ? 'sent' : 'received');
      });

      scrollToBottom();
    });

    // Load users
    async function loadUsers() {
      try {
        const token = localStorage.getItem('token');
        const res = await fetch('/api/users', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.ok) {
          const users = await res.json();
          renderUsers(users);
        }
      } catch (error) {
        console.error('Error loading users:', error);
      }
    }

    function renderUsers(users) {
      const usersList = document.getElementById('usersList');
      usersList.innerHTML = users.map(user => `
        <button class="user-btn w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-700/50 transition-colors text-left" data-id="${user._id}" data-username="${user.username}">
          <div class="relative">
            <div class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center text-white font-semibold">
              ${user.username.charAt(0).toUpperCase()}
            </div>
            <span class="status-dot absolute bottom-0 right-0 w-3 h-3 rounded-full bg-slate-500 border-2 border-slate-800"></span>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-white font-medium truncate">${user.username}</p>
            <p class="text-xs text-slate-500">Click to chat</p>
          </div>
        </button>
      `).join('');

      // Add click handlers
      document.querySelectorAll('.user-btn').forEach(btn => {
        btn.addEventListener('click', () => selectUser(btn.dataset.id, btn.dataset.username));
      });
    }

    function updateUserStatus() {
      document.querySelectorAll('.user-btn').forEach(btn => {
        const userId = btn.dataset.id;
        const statusDot = btn.querySelector('.status-dot');
        if (onlineUsers.has(userId)) {
          statusDot.className = 'status-dot absolute bottom-0 right-0 w-3 h-3 rounded-full bg-emerald-400 border-2 border-slate-800 online-dot';
        } else {
          statusDot.className = 'status-dot absolute bottom-0 right-0 w-3 h-3 rounded-full bg-slate-500 border-2 border-slate-800';
        }
      });
    }

    function selectUser(userId, username) {
      selectedUserId = userId;

      // Update UI
      document.querySelectorAll('.user-btn').forEach(btn => {
        btn.classList.remove('bg-slate-700');
        if (btn.dataset.id === userId) {
          btn.classList.add('bg-slate-700');
        }
      });

      document.getElementById('chatUsername').textContent = username;
      document.getElementById('chatUserInitial').textContent = username.charAt(0).toUpperCase();
      document.getElementById('chatStatus').textContent = onlineUsers.has(userId) ? 'Online' : 'Offline';

      const input = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();

      // Load history
      socket.emit('message:history', { userId1: currentUser._id, userId2: userId });
    }

    function appendMessage(message, type) {
      const messagesArea = document.getElementById('messagesArea');

      // Clear placeholder if exists
      if (messagesArea.querySelector('.text-center')) {
        messagesArea.innerHTML = '';
      }

      const isSent = type === 'sent';
      const time = new Date(message.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const div = document.createElement('div');
      div.className = `message-enter flex ${isSent ? 'justify-end' : 'justify-start'}`;
      div.innerHTML = `
        <div class="max-w-xs lg:max-w-md">
          <div class="px-4 py-3 rounded-2xl ${isSent
            ? 'bg-indigo-500 text-white rounded-br-sm'
            : 'bg-slate-700 text-slate-100 rounded-bl-sm'}">
            <p class="text-sm">${message.content}</p>
          </div>
          <p class="text-xs text-slate-500 mt-1 ${isSent ? 'text-right' : 'text-left'}">${time}</p>
        </div>
      `;
      messagesArea.appendChild(div);
    }

    function scrollToBottom() {
      const messagesArea = document.getElementById('messagesArea');
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    // Send message
    document.getElementById('messageForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const input = document.getElementById('messageInput');
      const content = input.value.trim();

      if (content && selectedUserId) {
        socket.emit('message:send', {
          recipientId: selectedUserId,
          content: content,
          senderId: currentUser._id
        });
        input.value = '';
      }
    });

    // Logout
    document.getElementById('logout').addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/';
    });
  </script>
</body>
</html>
